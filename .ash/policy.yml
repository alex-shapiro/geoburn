# yaml-language-server: $schema=https://hub.ashell.dev/schemas/policy/v1.json

schema_version: 1
dependencies:
  ash/base-macos: ^0
  ash/claude-code: ^0.0.5
  ash/git: ^0
  ash/github: ^0.0.1
  ash/rust-dev: ^0.0.4
files:
  rules:
  - path: ./**
  - path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
    operations:
    - read
  - path: ~/.zprofile
    operations:
    - read
  - path: ~/Library/Application Support/Arc/User Data
    operations:
    - read
  - path: ~/Library/Application Support/BraveSoftware/Brave-Browser
    operations:
    - read
  - path: ~/Library/Application Support/Chromium
    operations:
    - read
  - path: ~/Library/Application Support/Google/Chrome
    operations:
    - read
  - path: ~/Library/Application Support/Microsoft Edge
    operations:
    - read
  - path: ~/Library/Application Support/Vivaldi
    operations:
    - read
  - path: ~/Library/Application Support/com.operasoftware.Opera
    operations:
    - read
  - path: ~/Projects
    operations:
    - read
  - path: ~/Projects/.gitignore
    operations:
    - read
  - path: ~/Projects/bimcode
    operations:
    - read
  - path: ~/Projects/bimcode/.git/info/exclude
    operations:
    - read
  - path: ~/Projects/bimcode/.gitignore
    operations:
    - read
  - path: ~/Projects/bimcode/crates
    operations:
    - read
  - path: ~/Projects/bimcode/crates/hybrid-boolean
    operations:
    - read
  - path: ~/Projects/bimcode/crates/hybrid-boolean/STATUS.md
    operations:
    - read
  - path: ~/Projects/bimcode/crates/hybrid-boolean/src
    operations:
    - read
  - path: ~/Projects/bimcode/crates/hybrid-boolean/src/bezier.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/hybrid-boolean/src/tessellate.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/Cargo.toml
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/PORT_PLAN.md
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/bvh.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/classify.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram/boolean.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram/cdt.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram/exact_pred.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram/expansion.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram/mesh_in_triangle.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram/mod.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/geogram/triangle_isect.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/intersect.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/lib.rs
    operations:
    - read
  - path: ~/Projects/bimcode/crates/mesh-boolean/src/types.rs
    operations:
    - read
network:
  rules:
  - host: downloads.claude.ai
    ports:
    - 443
exec:
  rules:
  - path: ./**
io_devices:
  rules: []
